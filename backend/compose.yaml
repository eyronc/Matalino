services:
  mysql-db:
    image: mysql:latest
    env_file:
      - .env
    ports:
      - "3306:3306"
  discovery-server:
    build:
      context: ./discovery-server/discovery-server
    ports:
      - "8761:8761"
  ai-service:
    build:
      context: ./ai-tools_service/ai-tools_service
    depends_on:
      - discovery-server
    env_file:
      - .env
    ports:
      - "8083:8083"
  lesson-service:
    build:
      context: ./lesson_service/lesson_service
    depends_on:
      - discovery-server
    env_file:
      - .env
    ports:
      - "8082:8082"
  user-service:
    build:
      context: ./user_service/user_service
    depends_on:
      - mysql-db
      - discovery-server
    env_file:
      - .env
    ports:
      - "8081:8081"